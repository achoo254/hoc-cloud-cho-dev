# tmux config shared by all lab containers.
# Backend attaches via `tmux new-session -A -s lab` + `tmux attach -d -t lab`
# so WS reconnect restores scrollback/prompt and a 2nd tab kicks the 1st.
set -g history-limit 10000
set -g mouse on
set -g default-terminal "xterm-256color"
# Accidental `exit` inside the shell must NOT kill the pane — SessionManager
# owns container lifecycle (idle-timeout / explicit terminate).
set -g remain-on-exit on
