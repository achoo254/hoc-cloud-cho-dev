# ARP lab topology — 2 hosts on an isolated bridge. Internal-only so containers
# have no egress to host/internet. Project name is set per-session by
# lab-orchestrator (`docker compose -p lab-<sessionId>`).
services:
  host-a:
    build:
      context: ../..
      dockerfile: docker/lab-arp/Dockerfile
    hostname: host-a
    networks:
      lab-arp-net:
        ipv4_address: 10.0.0.10
    mac_address: "aa:bb:cc:00:00:01"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    memswap_limit: 128m
    cpus: 0.25
    pids_limit: 50

  host-b:
    build:
      context: ../..
      dockerfile: docker/lab-arp/Dockerfile
    hostname: host-b
    networks:
      lab-arp-net:
        ipv4_address: 10.0.0.20
    mac_address: "aa:bb:cc:00:00:02"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    memswap_limit: 128m
    cpus: 0.25
    pids_limit: 50

networks:
  lab-arp-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.0.0.0/24
