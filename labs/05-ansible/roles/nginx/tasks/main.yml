- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure document root exists
  ansible.builtin.file:
    path: "{{ nginx_document_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Deploy index.html
  ansible.builtin.copy:
    content: "<h1>Hello from {{ inventory_hostname }}</h1>"
    dest: "{{ nginx_document_root }}/index.html"
    mode: "0644"

- name: Deploy site config
  ansible.builtin.template:
    src: nginx-site.conf.j2
    dest: /etc/nginx/sites-available/lab.conf
    mode: "0644"
  notify: Reload nginx

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/lab.conf
    dest: /etc/nginx/sites-enabled/lab.conf
    state: link
  notify: Reload nginx

- name: Disable default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Ensure nginx running & enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
