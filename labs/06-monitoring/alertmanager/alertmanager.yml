route:
  receiver: default
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default
    # Điền Telegram bot token + chat id khi test thật
    # telegram_configs:
    #   - bot_token: "CHANGE_ME"
    #     chat_id: 123456789
    #     parse_mode: HTML
    webhook_configs:
      - url: http://host.docker.internal:5001/webhook
        send_resolved: true
