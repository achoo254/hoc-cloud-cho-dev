<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login — hoc-cloud</title>
  <link rel="stylesheet" href="/_shared/lab-template.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .login-card { max-width:420px; width:100%; padding:32px; border:1px solid var(--border,#333); border-radius:8px; background:var(--bg-elev,#1a1a1a); }
    .login-card h1 { margin-top:0; font-size:20px; }
    .login-card p { color:var(--muted,#888); font-size:14px; line-height:1.6; }
    .btn-github { display:flex; align-items:center; justify-content:center; gap:8px; padding:12px 16px; background:#24292e; color:#fff; text-decoration:none; border-radius:6px; font-weight:600; }
    .btn-github:hover { background:#2f363d; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin CMS</h1>
    <p>Đăng nhập bằng tài khoản GitHub nằm trong whitelist để quản lý nội dung lý thuyết.</p>
    <a class="btn-github" href="/auth/github">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="#fff"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      Continue with GitHub
    </a>
    <p style="margin-top:24px; font-size:12px;">
      Chỉ users trong <code>GITHUB_ADMIN_WHITELIST</code> mới có quyền truy cập.
    </p>
  </div>
</body>
</html>
