name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: DEPLOY SERVER STAGING
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (match VPS ABI — MODULE_VERSION 127 = Node 22/23)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install production deps
        run: npm ci --omit=dev

      - name: Compute release id
        id: release
        run: echo "id=$(date -u +%y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create bundle
        run: |
          tar -czf bundle.tar.gz \
            server \
            labs \
            node_modules \
            package.json \
            package-lock.json
          ls -lh bundle.tar.gz

      - name: Upload bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "bundle.tar.gz,deploy/remote-deploy.sh"
          target: "/tmp/hoc-cloud-deploy-${{ steps.release.outputs.id }}"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GITHUB_ADMIN_WHITELIST: ${{ secrets.ADMIN_WHITELIST }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET,GITHUB_ADMIN_WHITELIST,SESSION_SECRET
          script: |
            set -euo pipefail
            RELEASE="${{ steps.release.outputs.id }}"
            BASE="/var/www/hoc-cloud-cho-dev"
            STAGING="/tmp/hoc-cloud-deploy-$RELEASE"
            mkdir -p "$BASE/releases" "$BASE/shared"

            # Persist .env in shared/ so it survives release swaps.
            # Values come from GitHub environment secrets; re-rendered every deploy.
            umask 077
            cat > "$BASE/shared/.env" <<EOF
            NODE_ENV=production
            PORT=8387
            HOST=127.0.0.1
            GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET
            GITHUB_ADMIN_WHITELIST=$GITHUB_ADMIN_WHITELIST
            SESSION_SECRET=$SESSION_SECRET
            SQLITE_DB_PATH=$BASE/shared/data/hoccloud.db
            PUBLIC_BASE_URL=https://hoc-cloud.inetdev.io.vn
            EOF
            mkdir -p "$BASE/shared/data"

            mv "$STAGING/bundle.tar.gz" "$BASE/releases/$RELEASE.tar.gz"
            bash "$STAGING/deploy/remote-deploy.sh" "$RELEASE"
            rm -rf "$STAGING"
