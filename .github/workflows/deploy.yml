name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: DEPLOY SERVER STAGING
    # Ephemeral services for smoke test — runner-local, no external secrets.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: smoke-master-key
          MEILI_NO_ANALYTICS: 'true'
          MEILI_ENV: development
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -sf http://127.0.0.1:7700/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22 (match VPS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Install app deps
        run: npm ci
        working-directory: app

      - name: Extract Firebase Web config → VITE_* env
        # Paste the full firebaseConfig from Firebase Console into the
        # `FIREBASE_WEB_CONFIG` Actions Variable (Settings → Secrets and variables
        # → Actions → Variables). Both JS object and JSON formats are accepted.
        # Values are public (bundled into client JS).
        env:
          FIREBASE_WEB_CONFIG: ${{ vars.FIREBASE_WEB_CONFIG }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_WEB_CONFIG:-}" ]; then
            echo "::error::FIREBASE_WEB_CONFIG variable is empty (set it in Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          # Use node to parse — accepts both JSON and JS object literal syntax
          eval "$(FIREBASE_WEB_CONFIG="$FIREBASE_WEB_CONFIG" node -e '
            const raw = process.env.FIREBASE_WEB_CONFIG.trim();
            const cfg = (0, eval)("(" + raw + ")");
            const required = ["apiKey", "authDomain", "projectId", "appId"];
            for (const k of required) {
              if (!cfg[k]) { console.error("Missing field: " + k); process.exit(1); }
            }
            const out = [
              ["VITE_FIREBASE_API_KEY",     cfg.apiKey],
              ["VITE_FIREBASE_AUTH_DOMAIN", cfg.authDomain],
              ["VITE_FIREBASE_PROJECT_ID",  cfg.projectId],
              ["VITE_FIREBASE_APP_ID",      cfg.appId],
            ];
            for (const [k, v] of out) console.log(`echo "${k}=${v}" >> "$GITHUB_ENV"`);
          ')"
          echo "Firebase Web config extracted ($(grep -c ^VITE_FIREBASE_ "$GITHUB_ENV") vars)"

      - name: Build FE bundle (Vite → app/dist)
        run: npm run build
        working-directory: app

      - name: Build BE bundle (esbuild → dist-server/server.bundle.js)
        run: npm run build:server

      - name: Smoke test BE bundle (boot + /healthz)
        # Dùng services: mongodb + meilisearch tự spin up trong runner — không phụ
        # thuộc secrets VPS. Firebase init lazily (chỉ khi verify token), /healthz
        # không touch → không cần service account trong smoke.
        env:
          NODE_ENV: production
          PORT: '8399'
          HOST: 127.0.0.1
          MONGODB_URI: mongodb://127.0.0.1:27017/smoke
          MEILISEARCH_HOST: http://127.0.0.1:7700
          MEILISEARCH_API_KEY: smoke-master-key
        run: |
          node dist-server/server.bundle.js &
          SERVER_PID=$!
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8399/healthz > /dev/null; then break; fi
            sleep 0.5
          done
          BODY=$(curl -sf http://127.0.0.1:8399/healthz) || { echo "healthz unreachable"; kill $SERVER_PID 2>/dev/null; exit 1; }
          echo "healthz: $BODY"
          kill $SERVER_PID || true

      - name: Compute release id
        id: release
        run: echo "id=$(date -u +%y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create bundle
        run: |
          mkdir -p stage
          cp dist-server/server.bundle.js stage/server.bundle.js
          cp -r app/dist stage/app-dist
          tar -czf bundle.tar.gz -C stage .
          ls -lh bundle.tar.gz

      - name: Upload bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "bundle.tar.gz"
          target: "/tmp/hoccloud-deploy-${{ steps.release.outputs.id }}"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            RELEASE="${{ steps.release.outputs.id }}"
            BASE="/var/www/hoccloud"
            STAGING="/tmp/hoccloud-deploy-$RELEASE"
            PM2_APP="hoccloud-server"

            mkdir -p "$BASE/app/dist" "$BASE/shared/data" "$BASE/logs"

            # Persist .env ở shared/ (config only, không phải source).
            umask 077
            cat > "$BASE/shared/.env" <<EOF
            NODE_ENV=production
            PORT=8387
            HOST=127.0.0.1
            PUBLIC_BASE_URL=https://hoc-cloud.inetdev.io.vn
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MEILISEARCH_HOST=${{ secrets.MEILISEARCH_HOST }}
            MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            EOF

            # Extract bundle vào staging.
            EXTRACT="$STAGING/extract"
            mkdir -p "$EXTRACT"
            tar -xzf "$STAGING/bundle.tar.gz" -C "$EXTRACT"

            # Sync FE → $BASE/app/dist (atomic-ish qua rsync --delete).
            rsync -a --delete "$EXTRACT/app-dist/" "$BASE/app/dist/"

            # Replace BE bundle (esbuild bundled — no node_modules needed).
            cp "$EXTRACT/server.bundle.js" "$BASE/server.bundle.js"

            # Symlink .env → shared (PM2 load từ cwd = $BASE).
            ln -sfn "$BASE/shared/.env" "$BASE/.env"

            # Nginx reload (config đã setup sẵn, không deploy).
            sudo nginx -t && sudo systemctl reload nginx

            # PM2 restart/start bằng CLI args (không ship ecosystem.config.cjs).
            # NODE_ENV=production bắt buộc — server.js env loader dùng nó để
            # quyết định đọc .env từ cwd thay vì projectRoot.
            cd "$BASE"
            export NODE_ENV=production
            if pm2 describe "$PM2_APP" >/dev/null 2>&1; then
              pm2 restart "$PM2_APP" --update-env
            else
              pm2 start "$BASE/server.bundle.js" \
                --name "$PM2_APP" \
                --cwd "$BASE" \
                --max-memory-restart 300M \
                --log "$BASE/logs/out.log" \
                --error "$BASE/logs/err.log" \
                --merge-logs
            fi
            pm2 save

            rm -rf "$STAGING"
